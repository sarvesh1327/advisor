<!doctype html><html><head><meta charset='utf-8'><title>Advisor Overall Architecture</title><style>body{margin:0;background:#020617;color:#e2e8f0;font-family:Arial,sans-serif}svg{display:block;margin:0 auto;background:#020617}.title{font-size:28px;font-weight:700;fill:#f8fafc}.subtitle{font-size:16px;fill:#94a3b8}.box{rx:16;ry:16;stroke-width:2}.label{font-size:18px;font-weight:700;fill:#e2e8f0}.small{font-size:13px;fill:#cbd5e1}.arrow{stroke:#94a3b8;stroke-width:3;fill:none;marker-end:url(#arrow)}</style></head><body><svg width='1600' height='1100' viewBox='0 0 1600 1100' xmlns='http://www.w3.org/2000/svg'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#94a3b8'/></marker></defs><text x='800' y='55' text-anchor='middle' class='title'>Advisor Open-Weight Model — Overall Architecture</text><text x='800' y='85' text-anchor='middle' class='subtitle'>Local advisor model in front of Hermes / Codex main execution model</text><rect x='620' y='120' width='360' height='80' class='box' fill='rgba(8,51,68,.45)' stroke='#22d3ee'/><text x='800' y='155' text-anchor='middle' class='label'>1. Task Intake</text><text x='800' y='178' text-anchor='middle' class='small'>user task / cron task / API request</text><path d='M800 200 L800 235' class='arrow'/><rect x='540' y='235' width='520' height='110' class='box' fill='rgba(6,78,59,.45)' stroke='#34d399'/><text x='800' y='272' text-anchor='middle' class='label'>2. Context Assembly Layer</text><text x='800' y='296' text-anchor='middle' class='small'>repo summary • file tree slice • prior failures • tool/runtime limits • similar traces</text><text x='800' y='318' text-anchor='middle' class='small'>builds a compact structured packet for the advisor</text><path d='M800 345 L800 385' class='arrow'/><rect x='590' y='385' width='420' height='100' class='box' fill='rgba(76,29,149,.45)' stroke='#a78bfa'/><text x='800' y='423' text-anchor='middle' class='label'>3. Advisor Model</text><text x='800' y='447' text-anchor='middle' class='small'>small local open-weight model</text><text x='800' y='469' text-anchor='middle' class='small'>Qwen 7B / Llama 8B class, quantized</text><path d='M800 485 L800 525' class='arrow'/><rect x='520' y='525' width='560' height='110' class='box' fill='rgba(120,53,15,.35)' stroke='#fbbf24'/><text x='800' y='562' text-anchor='middle' class='label'>4. Advice Block Generator</text><text x='800' y='586' text-anchor='middle' class='small'>relevant files • likely failure modes • constraints</text><text x='800' y='608' text-anchor='middle' class='small'>recommended plan • avoid list • confidence</text><path d='M800 635 L800 680' class='arrow'/><rect x='540' y='680' width='520' height='110' class='box' fill='rgba(136,19,55,.4)' stroke='#fb7185'/><text x='800' y='717' text-anchor='middle' class='label'>5. Main Frontier Model</text><text x='800' y='741' text-anchor='middle' class='small'>Hermes / Codex / Claude etc.</text><text x='800' y='763' text-anchor='middle' class='small'>actual reasoning, tool choice, patch generation</text><path d='M800 790 L800 835' class='arrow'/><rect x='560' y='835' width='480' height='95' class='box' fill='rgba(251,146,60,.30)' stroke='#fb923c'/><text x='800' y='872' text-anchor='middle' class='label'>6. Execution Layer</text><text x='800' y='896' text-anchor='middle' class='small'>tools • edits • tests • review</text><path d='M800 930 L800 970' class='arrow'/><rect x='550' y='970' width='500' height='90' class='box' fill='rgba(30,41,59,.55)' stroke='#94a3b8'/><text x='800' y='1005' text-anchor='middle' class='label'>7. Outcome Capture</text><text x='800' y='1029' text-anchor='middle' class='small'>success/failure • files touched • retries • review notes → training traces</text><rect x='70' y='280' width='320' height='200' class='box' fill='rgba(30,41,59,.35)' stroke='#64748b'/><text x='230' y='320' text-anchor='middle' class='label'>Why this split?</text><text x='100' y='355' class='small'>Advisor = cheap steering + compression</text><text x='100' y='380' class='small'>Main model = deep reasoning + execution</text><text x='100' y='405' class='small'>Advisor never directly edits code</text><text x='100' y='430' class='small'>Safety/tool policy remains downstream</text><rect x='1180' y='280' width='340' height='220' class='box' fill='rgba(30,41,59,.35)' stroke='#64748b'/><text x='1350' y='320' text-anchor='middle' class='label'>Key contract</text><text x='1210' y='355' class='small'>Stable page: frontier model remains</text><text x='1210' y='380' class='small'>Advisor output = structured advice only</text><text x='1210' y='405' class='small'>No direct tool execution by advisor</text><text x='1210' y='430' class='small'>Train on your own Hermes traces</text><text x='1210' y='455' class='small'>Optimize for fewer failures + better file targeting</text></svg></body></html>
